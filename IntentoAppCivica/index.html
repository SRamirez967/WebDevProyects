<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intento App Civica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menubar">
        <!-- Nombre de la aplicación -->
        <h1>App | Cívica</h1>

        <!-- Agregamos un form que será la barra de búsqueda de ubicaciones -->
        <form>
            <input type="text" placeholder="Buscar ubicaciones...">
        </form>

        <br>

        <!-- Agregamos 3 botones: Usuario, Ayuda y Salir 
        Usuario: Ver información del usuario, beneficios de viaje y cambio de contraseña
        Ayuda: Información de apoyo para el usuario
        Salir: Sale de la cuenta de usuario nuevamente a la página de login-->
        
        <button>
            <img src="/imgs/logoUsuario.png" title="Usuario" alt="Logo usuario" width="30">
        </button>
        <button>
            <img src="/imgs/ayuda.jpg" title="Ayuda" alt="Logo ayuda" width="30">
        </button>
        <button>
            <img src="/imgs/salir.png" title="Salir" alt="Logo salir" width="30">
        </button>
    </div>

    <div id="civicapay">
        <!-- Aquí se puede consultar el saldo de CivicaPay -->
        <h2>Saldo CivicaPay</h2>
        <h3><i>$0.00</i></h3>

        <!-- Opción para recargar CivicaPay -->
        <button>
            <img src="/imgs/recargar.png" title="Recargar Cívica" alt="Logo Recargar Civica" width="30">
            Recargar Cívica
        </button>
        <!-- Ver los movimientos recientes de CivicaPay-->
        <button>Movimientos CivicaPay</button>

        <hr>

        <button>
            <img src="/imgs/transferirPlata.png" title="Pasar plata" alt="Logo Pasar plata" width="20">
            Pasar plata
        </button>
        <button>
            <img src="/imgs/realizarPagos.png" title="Hacer pagos" alt="Logo Hacer pagos" width="20">
            Hacer pagos
        </button>
        <button>
            <img src="/imgs/recargarCelular.jpg" title="Recargar celular" alt="Logo Recargar celular" width="20">
            Recargar celular
        </button>
        <button>
            <img src="/imgs/sacarPlata.png" title="Sacar plata" alt="Logo Sacar plata" width="20">
            Sacar plata
        </button>
    </div>

    <hr>

    <div id="civica">
        <button>
            <img src="/imgs/civica.png" title="Tu Civica" alt="Logo Civica" width="20">
            Tu Civica
        </button>
        <button>
            <img src="/imgs/viajarQR.avif" title="Viajar con QR" alt="Logo Viajar con QR" width="20">
            Viajar con QR
        </button>
        <button>
            <img src="/imgs/carnet.png" title="Carnet digital" alt="Logo Carnet digital" width="20">
            Tu carnet digital
        </button>

        <form>
            <input type="text" placeholder="Buscar ubicaciones...">
        </form>

        <p>ANUNCIOSSSS</p>
    </div>

    <div id="piepagina">
        <p>Ultima conexión: 2/27/26 5:15PM</p>
        <p>Version 3.0.64</p>
    </div>

    
</body>
</html>
